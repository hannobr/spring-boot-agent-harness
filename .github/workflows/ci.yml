name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Lint docs
        run: scripts/harness/doc-lint

      - name: Run verify and smoke-startup
        run: |
          ./mvnw -q verify
          scripts/harness/smoke-startup

      - name: Verify OpenAPI spec is current
        run: scripts/harness/check-openapi-drift --offline
